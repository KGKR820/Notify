<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notify - Real-Time Dashboard</title>
    <!-- SockJS and Stomp.js -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="toastContainer" class="toast-container"></div>

    <!-- SCREEN 1: CONNECT -->
    <form id="screenConnect" class="screen active" onsubmit="handleConnect(event)">
        <h1>Notify</h1>
        <p>Real-Time WebSocket Pub/Sub Notification Service</p>
        
        <label for="inputUserId">Your User ID</label>
        <input type="number" id="inputUserId" placeholder="e.g. 1001" required min="1">
        
        <label for="inputUserName">Your Name (optional)</label>
        <input type="text" id="inputUserName" placeholder="e.g. Alice Smith">
        
        <button type="submit">Connect & Open Dashboard</button>
    </form>

    <!-- SCREEN 2: DASHBOARD -->
    <div id="screenDashboard" class="screen">
        <header>
            <h2>Notify Portal</h2>
            <div class="user-badge">
                <div id="statusDot" class="status-dot"></div>
                <span id="labelUserConnected">Connecting...</span>
                <button onclick="handleDisconnect()">Disconnect</button>
            </div>
        </header>

        <main class="dashboard-body">
            <!-- LEFT COLUMN: SUBSCRIPTION MANAGER -->
            <section class="dashboard-col">
                <h3>Subscribe to Channel</h3>
                <form onsubmit="handleSubscribe(event)">
                    <input type="number" id="inputChannelId" placeholder="Channel ID" required min="1">
                    <button type="submit">Subscribe</button>
                </form>

                <h3>Active Channels</h3>
                <ul id="subList">
                    <li class="sub-empty">No active subscriptions</li>
                </ul>
            </section>

            <!-- CENTER COLUMN: NOTIFICATION FEED -->
            <section class="dashboard-col">
                <header class="feed-header">
                    <h3>Notification Center <span id="notifUnreadBadge">0</span></h3>
                    <button onclick="handleMarkAllAsRead()" id="btnMarkAllRead">Mark all as read</button>
                </header>

                <div id="feedContainer">
                    <div id="feedEmptyState">🔔 No notifications yet</div>
                </div>
            </section>

            <!-- RIGHT COLUMN: SIMULATOR PUBLISHER -->
            <section class="dashboard-col">
                <h3>Publish Event Simulator</h3>
                <form onsubmit="handlePublish(event)">
                    <input type="number" id="pubChannelId" placeholder="Target Channel ID" required min="1">
                    <input type="text" id="pubVideoTitle" placeholder="Event/Video Title" required>
                    <button type="submit">Publish Event</button>
                </form>
            </section>
        </main>
    </div>

    <!-- Custom JS -->
    <script src="app.js"></script>
</body>
</html>
